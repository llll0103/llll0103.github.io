<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.c360a.salesforce.com/beacon/c360a/4489b089-e5f0-444c-8f12-fdaca230979b/scripts/c360a.min.js?wtcp_id=1NDKa00000006naOAA"></script>
    <title>문의사항2 (utm)</title>
</head>
<style>
    body {
        background:#e1eddf;
        padding : 1rem;
    }
</style>
<body>
    얄로리로리~

    <div id="utm-debug" style="margin-top:1rem; padding:1rem; background:#fff; border-radius:8px; font-family:monospace; font-size:13px;"></div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const utm_source   = p.get('utm_source')   || '(없음)';
        const utm_medium   = p.get('utm_medium')   || '(없음)';
        const utm_campaign = p.get('utm_campaign') || '(없음)';
        const page_slug    = window.location.pathname;

        document.getElementById('utm-debug').innerHTML = `
            <b>utm_source:</b> ${utm_source}<br>
            <b>utm_medium:</b> ${utm_medium}<br>
            <b>utm_campaign:</b> ${utm_campaign}<br>
            <b>page_slug:</b> ${page_slug}
        `;
    </script>
</body>
</html>
